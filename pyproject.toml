[project]
name = "textual-system-monitor"
version = "0.1.0"
description = "A simple system monitor in Python, using Textual"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "psutil==5.9.8",
    "textual==0.57.0",
    "textual-dev==1.5.1",
]

[dependency-groups]
dev = [
    "flake8==7.0.0",
    "pytest==8.1.1",
]
